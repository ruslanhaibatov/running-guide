<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARDA SAATÇI — БЕГОВОЙ ГАЙД</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8001c;
    --red-dim: #8a0010;
    --white: #f5f0eb;
    --offwhite: #c8c0b5;
    --dark: #0a0a08;
    --charcoal: #111110;
    --mid: #1e1e1b;
    --panel: #161614;
    --accent: #d4a843;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, transparent 30%, rgba(10,10,8,0.7) 65%, var(--dark) 100%),
      linear-gradient(90deg, rgba(10,10,8,0.6) 0%, transparent 60%);
    z-index: 2;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    background:
      url('https://images.redbull.com/rbx/videos/cp_share_id:1331835946780516352/w_1920,h_1080,q_auto,f_auto/201521/00001') center/cover no-repeat,
      url('https://images.redbull.com/rbx/image/upload/q_auto,f_auto/redbullcom/2026/5/10/zvqchgc3fzhopqbxgphm') center/cover no-repeat,
      linear-gradient(135deg, #1a0a0a 0%, #0d0d0b 50%, #141210 100%);
    background-size: cover;
    background-position: center top;
    filter: contrast(1.1) saturate(0.85);
  }

  /* Fallback pattern when image doesn't load */
  .hero-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(232,0,28,0.03) 60px,
        rgba(232,0,28,0.03) 61px
      );
  }

  .hero-runner-img {
    position: absolute;
    right: -2%;
    bottom: 0;
    height: 95%;
    width: auto;
    z-index: 3;
    filter: contrast(1.15) saturate(0.9);
    opacity: 0.92;
  }

  .hero-number {
    position: absolute;
    right: 2%;
    top: 8%;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(120px, 18vw, 320px);
    color: rgba(232,0,28,0.06);
    line-height: 1;
    z-index: 2;
    letter-spacing: -0.03em;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 4;
    padding: 0 6vw 7vh;
  }

  .hero-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-label::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--red);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 160px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 8px;
  }

  h1 span {
    color: var(--red);
    display: block;
  }

  .hero-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(14px, 2vw, 20px);
    font-weight: 300;
    font-style: italic;
    color: var(--offwhite);
    letter-spacing: 0.08em;
    margin-bottom: 40px;
    max-width: 500px;
    line-height: 1.5;
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
  }

  .stat {
    border-left: 2px solid var(--red);
    padding-left: 14px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 48px);
    color: var(--white);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--offwhite);
    margin-top: 2px;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0.5;
  }

  .scroll-hint span {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--offwhite);
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--offwhite), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,8,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(232,0,28,0.2);
    padding: 0 6vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--white);
  }

  .nav-logo span { color: var(--red); }

  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--offwhite);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--red); }

  /* ── SECTIONS ── */
  section {
    padding: 100px 6vw;
  }

  .section-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-eyebrow::after {
    content: '';
    flex: 1;
    max-width: 60px;
    height: 1px;
    background: var(--red);
  }

  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 6vw, 80px);
    line-height: 0.95;
    letter-spacing: 0.03em;
    color: var(--white);
    margin-bottom: 40px;
  }

  h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 12px;
  }

  p {
    font-size: clamp(14px, 1.5vw, 16px);
    line-height: 1.75;
    color: var(--offwhite);
    max-width: 680px;
  }

  /* ── QUOTE BLOCK ── */
  .quote-block {
    position: relative;
    background: var(--panel);
    border-left: 4px solid var(--red);
    padding: 32px 36px;
    margin: 60px 0;
  }

  .quote-block::before {
    content: '"';
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    color: rgba(232,0,28,0.12);
    position: absolute;
    top: -20px;
    left: 20px;
    line-height: 1;
  }

  .quote-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 300;
    font-style: italic;
    line-height: 1.4;
    color: var(--white);
    position: relative;
    z-index: 1;
    max-width: 100%;
  }

  .quote-attr {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--red);
    margin-top: 16px;
    font-style: normal;
  }

  /* ── ABOUT ── */
  #about {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .about-img-wrap {
    position: relative;
  }

  .about-img-wrap img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    filter: contrast(1.1) saturate(0.9);
  }

  .about-img-wrap::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    background: linear-gradient(to top, var(--dark), transparent);
  }

  .about-img-credit {
    position: absolute;
    bottom: 16px;
    right: 16px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200,192,181,0.6);
    z-index: 2;
  }

  .about-img-fallback {
    width: 100%;
    aspect-ratio: 3/4;
    background:
      linear-gradient(160deg, #1a0a0a 0%, #0e0e0c 40%, #121008 100%),
      repeating-linear-gradient(
        -30deg,
        transparent,
        transparent 40px,
        rgba(232,0,28,0.04) 40px,
        rgba(232,0,28,0.04) 41px
      );
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .about-img-fallback-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: rgba(232,0,28,0.3);
    letter-spacing: 0.1em;
    line-height: 1;
  }

  .about-img-fallback-sub {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(200,192,181,0.4);
  }

  .about-text .section-eyebrow { margin-bottom: 16px; }

  .about-text p { margin-bottom: 20px; }

  .bio-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 32px;
  }

  .bio-tag {
    border: 1px solid rgba(232,0,28,0.4);
    padding: 5px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--offwhite);
  }

  /* ── TIMELINE ── */
  #timeline { background: var(--charcoal); }

  .timeline {
    position: relative;
    margin-top: 60px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 120px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--red), rgba(232,0,28,0.1));
  }

  .tl-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 40px;
    padding: 32px 0;
    position: relative;
  }

  .tl-item::before {
    content: '';
    position: absolute;
    left: 115px;
    top: 40px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 16px rgba(232,0,28,0.6);
  }

  .tl-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--red);
    line-height: 1;
    text-align: right;
    padding-right: 20px;
    padding-top: 6px;
  }

  .tl-body h3 { margin-bottom: 8px; }
  .tl-body p { max-width: 560px; }

  .tl-badge {
    display: inline-block;
    background: rgba(232,0,28,0.12);
    border: 1px solid rgba(232,0,28,0.3);
    padding: 3px 10px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 10px;
  }

  /* ── TRAINING GRID ── */
  #training { background: var(--dark); }

  .training-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 60px;
  }

  .training-card {
    background: var(--panel);
    padding: 36px 30px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }

  .training-card:hover { background: var(--mid); }

  .training-card::before {
    content: attr(data-num);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    color: rgba(232,0,28,0.05);
    position: absolute;
    top: -10px;
    right: -10px;
    line-height: 1;
    pointer-events: none;
  }

  .card-icon {
    width: 36px;
    height: 2px;
    background: var(--red);
    margin-bottom: 20px;
  }

  .training-card h3 { font-size: 18px; margin-bottom: 12px; }
  .training-card p { font-size: 14px; line-height: 1.7; max-width: 100%; }

  .training-card .highlight {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red);
  }

  /* ── WEEK PLAN ── */
  #week { background: var(--charcoal); }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-top: 60px;
  }

  .day-card {
    background: var(--panel);
    padding: 24px 18px;
    min-height: 200px;
    position: relative;
  }

  .day-card.rest {
    background: rgba(14,14,12,0.5);
    opacity: 0.65;
  }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--red);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    display: block;
    border-bottom: 1px solid rgba(232,0,28,0.2);
    padding-bottom: 10px;
  }

  .day-type {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .day-desc {
    font-size: 12px;
    line-height: 1.6;
    color: var(--offwhite);
    max-width: 100%;
  }

  .day-vol {
    position: absolute;
    bottom: 16px;
    left: 18px;
    right: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: rgba(245,240,235,0.12);
    letter-spacing: 0.05em;
  }

  /* ── NUTRITION ── */
  #nutrition { background: var(--dark); }

  .nutrition-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    margin-top: 60px;
    align-items: start;
  }

  .macro-bars { margin-bottom: 40px; }

  .macro-bar-item { margin-bottom: 20px; }

  .macro-bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .macro-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
  }

  .macro-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--red);
  }

  .bar-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--red), var(--red-dim));
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -4px;
    width: 2px;
    height: 12px;
    background: var(--white);
  }

  .meal-list { list-style: none; }

  .meal-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .meal-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--red);
    line-height: 1;
    min-width: 70px;
  }

  .meal-body {}
  .meal-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 4px;
  }
  .meal-detail { font-size: 13px; line-height: 1.5; color: var(--offwhite); max-width: 100%; }

  .calorie-banner {
    background: var(--red);
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 32px;
  }

  .calorie-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 5vw, 60px);
    color: var(--white);
    line-height: 1;
  }

  .calorie-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }

  .calorie-note {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(255,255,255,0.75);
    max-width: 240px;
    line-height: 1.5;
    text-align: right;
  }

  /* ── TECHNIQUE ── */
  #technique { background: var(--charcoal); }

  .technique-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    margin-top: 60px;
  }

  .tech-card {
    background: var(--panel);
    padding: 40px 36px;
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 24px;
    align-items: start;
    transition: background 0.3s;
  }

  .tech-card:hover { background: var(--mid); }

  .tech-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: rgba(232,0,28,0.3);
    line-height: 1;
  }

  .tech-card h3 { font-size: 16px; margin-bottom: 10px; }
  .tech-card p { font-size: 13px; line-height: 1.7; max-width: 100%; }

  /* ── MENTAL ── */
  #mental { background: var(--dark); }

  .principles {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    margin-top: 60px;
  }

  .principle {
    background: var(--panel);
    padding: 36px 32px;
    position: relative;
  }

  .principle-line {
    width: 100%;
    height: 3px;
    background: linear-gradient(to right, var(--red), transparent);
    margin-bottom: 24px;
  }

  .principle h3 { font-size: 16px; margin-bottom: 10px; }
  .principle p { font-size: 13px; line-height: 1.75; max-width: 100%; }

  /* ── PHOTO STRIP ── */
  .photo-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    padding: 0;
    margin: 0 -6vw;
  }

  .strip-cell {
    aspect-ratio: 3/4;
    overflow: hidden;
    position: relative;
    background: var(--mid);
  }

  .strip-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%) contrast(1.1);
    transition: transform 0.5s ease, filter 0.5s ease;
  }

  .strip-cell:hover img {
    transform: scale(1.05);
    filter: grayscale(0%) contrast(1.1);
  }

  .strip-cell-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #1a0a0a, #0d0d0b);
  }

  .strip-cell-fallback span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: rgba(232,0,28,0.2);
    letter-spacing: 0.1em;
  }

  .strip-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px;
    background: linear-gradient(to top, rgba(10,10,8,0.9) 0%, transparent 100%);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--offwhite);
  }

  /* ── RECOVERY ── */
  #recovery { background: var(--charcoal); }

  .recovery-list {
    list-style: none;
    margin-top: 60px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .recovery-item {
